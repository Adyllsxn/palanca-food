# src/orchestration/docker-compose.yml

version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: chatnal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatnal
      POSTGRES_PASSWORD: chatnal123
      POSTGRES_DB: chatnal_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chatnal-network

  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    container_name: chatnal-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://chatnal:chatnal123@postgres:5432/chatnal_db?schema=public
      JWT_SECRET: your-super-secret-jwt-key-change-this
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - postgres
    networks:
      - chatnal-network

  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
    container_name: chatnal-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - chatnal-network

volumes:
  postgres_data:
    driver: local

networks:
  chatnal-network:
    driver: bridge