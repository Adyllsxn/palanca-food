version: '3.8'

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: flexshoe_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ADYLLSXNPOSTGRES
      POSTGRES_DB: db_flexshoe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - flexshoe_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Backend API (NestJS)
  # ============================================
  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    container_name: flexshoe_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:ADYLLSXNPOSTGRES@postgres:5432/db_flexshoe
      JWT_SECRET: ${JWT_SECRET:-flexshoe_super_secret_key_2026}
      FRONTEND_URL: http://frontend:3000
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - flexshoe_network
    command: >
      sh -c "
        npx prisma migrate deploy &&
        node dist/main
      "

  # ============================================
  # Frontend (Next.js)
  # ============================================
  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
    container_name: flexshoe_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://backend:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - flexshoe_network

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
    driver: local

# ============================================
# Networks
# ============================================
networks:
  flexshoe_network:
    driver: bridge